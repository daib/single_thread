# docker-compose.yml
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: singlethread
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  letta:
    image: lettaai/letta:latest
    ports:
      - "8283:8283"

volumes:
  postgres_data:
